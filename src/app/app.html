@if (showNav()) {
  <header class="header">
    <a class="header-brand" [routerLink]="['/' + groupSlug() + '/matches']">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 6.88 17.23M12 2a10 10 0 0 0-6.88 17.23M12 22V12M5.5 7.5l6.5 4.5 6.5-4.5"/></svg>
      Foot Presence
    </a>

    <!-- Navigation desktop -->
    <nav class="desktop-nav">
      <a [routerLink]="['/' + groupSlug() + '/matches']" routerLinkActive="active" class="desktop-nav-link">Matchs</a>
      <a [routerLink]="['/' + groupSlug() + '/profile']" routerLinkActive="active" class="desktop-nav-link">{{ auth.displayName() }}</a>
      @if (auth.isAdmin()) {
        <a [routerLink]="['/' + groupSlug() + '/admin']" routerLinkActive="active" class="desktop-nav-link nav-admin">Admin</a>
      }
      <button class="btn-logout" (click)="logout()">Déconnexion</button>
    </nav>

    <!-- Nom du joueur (mobile uniquement, lien profil) -->
    <a class="header-player" [routerLink]="['/' + groupSlug() + '/profile']">{{ auth.displayName() }}</a>
  </header>
}

<main [class.with-nav]="showNav()">
  <router-outlet />
</main>

<!-- Navigation bottom (mobile uniquement) -->
@if (showNav()) {
  <nav class="bottom-nav">
    <a [routerLink]="['/' + groupSlug() + '/matches']" routerLinkActive="active" class="bottom-nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>Matchs</span>
    </a>
    <a [routerLink]="['/' + groupSlug() + '/profile']" routerLinkActive="active" class="bottom-nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Profil</span>
    </a>
    @if (auth.isAdmin()) {
      <a [routerLink]="['/' + groupSlug() + '/admin']" routerLinkActive="active" class="bottom-nav-item admin">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Admin</span>
      </a>
    }
    <button class="bottom-nav-item logout-btn" (click)="logout()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Quitter</span>
    </button>
  </nav>
}
